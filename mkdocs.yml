site_name: Bannerbound
site_description: >-
  The complete field guide to Bannerbound — the civilization-building Minecraft
  modpack. Found a settlement, lead your citizens, research the ages, and raise
  a banner that outlives you.
site_author: Bannerbound Wiki Contributors
site_url: https://tannersteorts.com/bannerbound-docs/

repo_name: Nitsu430/Bannerbound
repo_url: https://github.com/Nitsu430/Bannerbound
edit_uri: https://github.com/Tann2019/bannerbound-docs/edit/main/docs/

copyright: >-
  Bannerbound is created by Nitsu (Nitsu430) and licensed MIT. This wiki is a
  community field guide. <a href="#__consent">Change cookie settings</a>

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
  nav:
    omitted_files: info

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: material/feather
      abstract: material/script-text
      info: material/information
      tip: material/lightbulb-on
      success: material/check-decagram
      question: material/help-circle
      warning: material/alert
      failure: material/close-octagon
      danger: material/skull-crossbones
      bug: material/shield-bug
      example: material/flask
      quote: material/format-quote-close
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Follow system theme
    - media: "(prefers-color-scheme: light)"
      scheme: bannerbound-light
      toggle:
        icon: material/weather-sunny
        name: Switch to the night sky
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to parchment
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - announce.dismiss

extra:
  status:
    new: Recently added
    deprecated: May have changed
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nitsu430/Bannerbound
      name: Bannerbound on GitHub
    - icon: fontawesome/brands/discord
      name: The Bannerbound SMP
  generator: false
  consent:
    title: Cookie consent
    description: >-
      This wiki uses analytics cookies only to measure which pages are useful so
      we can improve the guide. Your consent helps us make the docs better.
    actions:
      - accept
      - reject
      - manage

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: ⚑
      permalink_title: Anchor link to this section
      title: On this page
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      separator: '[\s​\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation & Setup: getting-started/installation.md
      - Your First Hour: getting-started/first-hour.md
      - Founding a Settlement: getting-started/founding-a-settlement.md
      - How to Play (The Core Loop): getting-started/core-loop.md
  - The Civilization:
      - civilization/index.md
      - Settlements & Growth: civilization/settlements.md
      - Citizens & Needs: civilization/citizens.md
      - Jobs & Labor: civilization/jobs-and-labor.md
      - Housing & Appeal: civilization/housing.md
      - Workshops & Storage: civilization/workshops.md
      - The Food Economy: civilization/food.md
      - Territory & Outposts: civilization/territory.md
      - Government & Law: civilization/government.md
      - Research & Eras: civilization/research-and-eras.md
      - Faith & the Stars: civilization/faith.md
      - Culture & Heraldry: civilization/culture-and-heraldry.md
      - Walls & Defenses: civilization/walls.md
      - Diplomacy, Trade & War: civilization/diplomacy.md
      - Barbarians & Raids: civilization/barbarians.md
      - Crises: civilization/crises.md
  - The Antiquity Age:
      - antiquity/index.md
      - Knapping & First Tools: antiquity/knapping.md
      - Tool Tiers & Ages: antiquity/tool-tiers.md
      - Woodworking: antiquity/woodworking.md
      - Masonry: antiquity/masonry.md
      - Metalworking & Bronze: antiquity/metalworking.md
      - Pottery & the Kiln: antiquity/pottery.md
      - Tannery & Leather: antiquity/tannery.md
      - Cooking & Food: antiquity/cooking-and-food.md
      - Brewing: antiquity/brewing.md
      - Herbalism & Poisons: antiquity/herbalism.md
      - Fletching & Archery: antiquity/fletching-and-archery.md
      - Building Materials: antiquity/building.md
  - Reference:
      - reference/index.md
      - Recipe Reference: reference/recipes.md
      - Keybinds & Commands: reference/keybinds-and-commands.md
      - The Chronicle & Ponder: reference/codex-and-ponder.md
      - Optional Mods: reference/optional-mods.md
      - Glossary: reference/glossary.md
      - FAQ & Troubleshooting: reference/faq.md
